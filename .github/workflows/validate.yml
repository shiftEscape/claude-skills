name: Validate Skills

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "scripts/**"
  pull_request:
    branches: [main]
    paths:
      - "skills/**"
      - "scripts/**"

jobs:
  validate:
    name: Validate skill structure
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate all skills
        run: node scripts/validate.js

      - name: Package all skills
        run: node scripts/package.js --all

      - name: Copy .skill files into skills/ folders
        run: |
          for skill_file in dist/*.skill; do
            skill_name=$(basename "$skill_file" .skill)
            cp "$skill_file" "skills/$skill_name/$skill_name.skill"
            echo "Copied $skill_name.skill → skills/$skill_name/"
          done

      - name: Commit .skill files
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/**/*.skill
          git diff --staged --quiet || git commit -m "chore: update packaged .skill files [skip ci]"
          git push

      - name: Upload individual skill artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-skills
          path: dist/*.skill
          retention-days: 30
